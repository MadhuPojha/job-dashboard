<!DOCTYPE html>
<html>
<head>
<title>Job Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    transition: 0.3s;
}

.theme-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    background: rgba(0,0,0,0.1);
    backdrop-filter: blur(6px);
    transition: 0.3s;
    user-select: none;
}

.light .theme-toggle {
    background: white;
}

.dark .theme-toggle {
    background: #1f1f1f;
}

/* LIGHT MODE */
.light {
    background: #f5f5f5;
    color: #111;
}

/* DARK MODE */
.dark {
    background: #121212;
    color: white;
}

.job {
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
}

.light .job {
    background: white;
    color: black;
}

button, select {
    padding: 8px;
    margin: 5px;
    cursor: pointer;
}

.topbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}
</style>
</head>

<body class="light">

<h2>Job Dashboard</h2>

<div class="topbar">

<div class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
    🌙
</div>

<select id="filter" onchange="renderJobs()">
    <option value="All">All</option>
    <option value="AI/ML">AI/ML</option>
    <option value="Frontend">Frontend</option>
    <option value="Backend">Backend</option>
    <option value="Fullstack">Fullstack</option>
    <option value="System">System</option>
    <option value="Software">Software</option>
</select>

<button onclick="loadJobs()">🔄 Refresh</button>

</div>

<div id="jobs"></div>

<script>

let allJobs = [];

async function loadJobs() {
    const res = await fetch('/api/jobs');
    allJobs = await res.json();
    renderJobs();
}

function renderJobs() {
    const filter = document.getElementById("filter").value;
    const container = document.getElementById("jobs");

    container.innerHTML = "";

    let jobs = allJobs;

    if (filter !== "All") {
        jobs = jobs.filter(j => j.role === filter);
    }

    jobs.forEach(job => {
        const div = document.createElement("div");
        div.className = "job";

        div.innerHTML = `
            <b>${job.title}</b><br>
            <small>${job.source} • ${job.role}</small><br>
            <a href="${job.link}" target="_blank">View Job →</a>
        `;

        container.appendChild(div);
    });
}

function toggleTheme() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

loadJobs();

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    body.classList.toggle("dark");
    body.classList.toggle("light");

    // switch icon
    if (body.classList.contains("dark")) {
        btn.innerHTML = "☀️";
    } else {
        btn.innerHTML = "🌙";
    }
}

</script>

</body>
</html>
